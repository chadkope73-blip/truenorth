<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>True North | Cellular Reception Estimator</title>

<meta name="description" content="Estimate cellular reception before traveling using ZIP code, coordinates, and terrain conditions.">
<meta name="theme-color" content="#0f1416">

<link rel="icon" href="logo.png">

<script defer src="/_vercel/insights/script.js"></script>

<style>

:root{
--bg1:#0b1220;
--bg2:#13233f;
--card:rgba(20,32,51,.82);
--line:#2a3d63;
--text:#e8eefc;
--muted:#a9b7d3;
--accent:#8dd3ff;
--accent2:#ffd98a;
--good:#65d98f;
--maybe:#ffd166;
--bad:#ff8a80;
--panel:#0d1727;
}

*{
box-sizing:border-box;
}

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:
linear-gradient(rgba(11,18,32,.45),rgba(11,18,32,.55)),
url("/topo-bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:var(--text);
text-align:center;
margin:0;
padding:20px;
min-height:100vh;
}

.navgenie-link{
position:fixed;
top:16px;
right:16px;
z-index:1000;
}

.navgenie-link a{
background:#0f1b2e;
color:#f2d8a7;
padding:8px 14px;
border-radius:10px;
text-decoration:none;
font-weight:600;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 6px 16px rgba(0,0,0,.35);
}

.container{
max-width:720px;
margin:auto;
background:var(--card);
padding:25px;
border-radius:24px;
border:1px solid var(--line);
backdrop-filter:blur(8px);
box-shadow:0 16px 40px rgba(0,0,0,.25);
}

.logo{
max-width:180px;
margin-bottom:20px;
}

h1{
color:var(--accent2);
margin-bottom:10px;
}

p{
color:var(--muted);
line-height:1.5;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:14px;
border:none;
font-size:16px;
box-sizing:border-box;
}

input,select{
background:var(--panel);
color:var(--text);
border:1px solid var(--line);
}

button{
background:linear-gradient(180deg,var(--accent),#67b8f6);
color:#07111f;
font-weight:bold;
cursor:pointer;
}

button.secondary{
background:linear-gradient(180deg,#ffe7b2,#ffd98a);
}

.result{
margin-top:20px;
padding:15px;
background:var(--panel);
border-radius:14px;
border:1px solid var(--line);
display:none;
text-align:left;
}

.kpis{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.kpi{
background:#101a2c;
padding:10px;
border-radius:12px;
border:1px solid var(--line);
}

.good{color:var(--good);}
.maybe{color:var(--maybe);}
.bad{color:var(--bad);}

.footer{
margin-top:25px;
font-size:14px;
color:var(--muted);
}

.footer a{
color:var(--accent2);
text-decoration:none;
}

.donate{
margin-top:25px;
}

.donate-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 16px;
border:1px solid var(--accent2);
border-radius:12px;
background:#0e1a22;
color:var(--accent2);
text-decoration:none;
font-weight:bold;
}

.donate-btn img{
width:24px;
height:24px;
}

</style>
</head>

<body>

<div class="navgenie-link">
<a href="https://navgenie.ittworks.com">🧭 Toolbelt</a>
</div>

<div class="container">

<img src="logo.png" class="logo">

<h1>True North</h1>

<p>
Estimate cellular signal strength before traveling using location, carrier, and terrain.
</p>

<input id="zip" placeholder="ZIP Code">

<select id="carrier">
<option value="verizon">Verizon</option>
<option value="att">AT&T</option>
<option value="tmobile">T-Mobile</option>
</select>

<input id="lat" placeholder="Latitude (optional)">
<input id="lon" placeholder="Longitude (optional)">

<select id="terrain">
<option value="flat">Flat terrain</option>
<option value="rolling">Rolling hills</option>
<option value="forest">Forest</option>
<option value="mountain">Mountain</option>
<option value="canyon">Canyon</option>
</select>

<button onclick="estimate()">Estimate Signal</button>
<button class="secondary" onclick="getLocation()">Use My Location</button>

<div id="result" class="result"></div>

<div class="donate">

<p>Enjoying the tools? Support development.</p>

<a class="donate-btn" href="https://donate.stripe.com/4gM3cv0kV4UJbzPfeDeAg00" target="_blank">
<img src="ittw-donate.png">
Support InTandem Toolworks
</a>

</div>

<div class="footer">

Built by <b>In Tandem Toolworks</b>

<br><br>

<a href="mailto:support@ittworks.com">
support@ittworks.com
</a>

<br><br>

<a href="https://www.facebook.com/InTandemToolworks">
Follow us on Facebook
</a>

</div>

</div>

<script>

const zipLookup={
"80202":[39.7525,-104.9995],
"80301":[40.0392,-105.2519],
"80401":[39.7555,-105.2211],
"81657":[39.6403,-106.3742],
"81501":[39.0639,-108.5506],
"81301":[37.2753,-107.8801]
};

const towers={
verizon:[[39.7392,-104.9903],[39.6403,-106.3742],[39.0639,-108.5506]],
att:[[39.7525,-104.9995],[39.5501,-107.3248],[37.2753,-107.8801]],
tmobile:[[39.7392,-104.9903],[39.5501,-107.3248],[37.2753,-107.8801]]
};

function haversine(lat1,lon1,lat2,lon2){
const R=3958.8;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function terrainPenalty(t){
if(t==="rolling")return 2;
if(t==="forest")return 3;
if(t==="mountain")return 6;
if(t==="canyon")return 8;
return 0;
}

function estimate(){

let zip=document.getElementById("zip").value.trim();

let lat,lon;

if(zipLookup[zip]){
lat=zipLookup[zip][0];
lon=zipLookup[zip][1];
}else{
lat=parseFloat(lat.value);
lon=parseFloat(lon.value);
}

if(isNaN(lat)||isNaN(lon)){
result.style.display="block";
result.innerHTML="Enter ZIP or coordinates.";
return;
}

let carrier=document.getElementById("carrier").value;

let best=999;

towers[carrier].forEach(t=>{
let d=haversine(lat,lon,t[0],t[1]);
if(d<best)best=d;
});

let terrain=document.getElementById("terrain").value;

let range=25-terrainPenalty(terrain);

let status="Unlikely";
let color="bad";

if(best<range*.6){status="Likely";color="good"}
else if(best<range){status="Possible";color="maybe"}

result.style.display="block";
result.innerHTML=`
<div class="kpis">
<div class="kpi">Nearest Tower: ${best.toFixed(1)} miles</div>
<div class="kpi">Estimated Range: ${range.toFixed(1)} miles</div>
<div class="kpi">Terrain Loss: −${terrainPenalty(terrain)} miles</div>
<div class="kpi"><b class="${color}">${status}</b></div>
</div>
`;

}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat.value=pos.coords.latitude.toFixed(5);
lon.value=pos.coords.longitude.toFixed(5);
});
}

</script>

</body>
</html>
