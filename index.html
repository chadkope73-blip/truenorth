function resolveLocation(){

const zip=document.getElementById("zip").value.trim();

if(zip && zipLookup[zip]){
return zipLookup[zip];
}

const lat=parseFloat(document.getElementById("lat").value);
const lon=parseFloat(document.getElementById("lon").value);

return {lat,lon};

}

function haversine(lat1, lon1, lat2, lon2){
const R=3958.8;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function radioRange(height){
const ft=height*3.28;
return 1.23*(Math.sqrt(ft)+Math.sqrt(5));
}

function terrainPenalty(type){

if(type==="flat") return 0;
if(type==="rolling") return 2;
if(type==="forest") return 3;
if(type==="mountain") return 6;
if(type==="canyon") return 8;

return 0;
}

function estimate(){

const loc=resolveLocation();

if(!loc || Number.isNaN(loc.lat) || Number.isNaN(loc.lon)){
output.innerHTML="Enter ZIP or coordinates.";
return;
}

const carrier=document.getElementById("carrier").value;
const carrierTowers=towers[carrier] || [];

if(!carrierTowers.length){
output.innerHTML="No tower samples available for that carrier yet.";
return;
}

let best=null;

carrierTowers.forEach(t=>{
let d=haversine(loc.lat,loc.lon,t.lat,t.lon);
if(!best || d<best.distance){
best={tower:t,distance:d};
}
});

let range=radioRange(best.tower.height);
const terrain=document.getElementById("terrain").value;
let effective=range-terrainPenalty(terrain);

let status="Unlikely";
let color="bad";

if(best.distance<effective*0.6){
status="Likely";
color="good";
}
else if(best.distance<effective){
status="Possible";
color="maybe";
}

const carrierName = carrier === "att" ? "AT&T" : carrier === "tmobile" ? "T-Mobile" : "Verizon";

output.innerHTML=
`
Carrier: ${carrierName}<br>
Nearest tower distance: ${best.distance.toFixed(1)} miles<br>
Estimated usable range: ${effective.toFixed(1)} miles<br><br>
Signal estimate:
<span class="${color}">${status}</span><br><br>
<small>Estimate is based on sample data for established carriers and simplified terrain assumptions.</small>
`;

}

function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

lat.value=pos.coords.latitude.toFixed(5);
lon.value=pos.coords.longitude.toFixed(5);

});

}
